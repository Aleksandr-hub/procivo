parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    # === Shared Kernel ===
    App\Shared\:
        resource: '../src/Shared/'

    # === Bounded Contexts ===
    App\Identity\:
        resource: '../src/Identity/'
        exclude:
            - '../src/Identity/Domain/Entity/'

    App\Organization\:
        resource: '../src/Organization/'
        exclude:
            - '../src/Organization/Domain/Entity/'

    App\TaskManager\:
        resource: '../src/TaskManager/'
        exclude:
            - '../src/TaskManager/Domain/Entity/'

    App\Workflow\:
        resource: '../src/Workflow/'
        exclude:
            - '../src/Workflow/Domain/Entity/'

    App\Resource\:
        resource: '../src/Resource/'
        exclude:
            - '../src/Resource/Domain/Entity/'

    App\Directory\:
        resource: '../src/Directory/'
        exclude:
            - '../src/Directory/Domain/Entity/'

    App\Notification\:
        resource: '../src/Notification/'
        exclude:
            - '../src/Notification/Domain/Entity/'

    App\Search\:
        resource: '../src/Search/'

    # === Bus Interfaces → Implementations ===
    App\Shared\Application\Bus\CommandBusInterface:
        alias: App\Shared\Infrastructure\Bus\MessengerCommandBus

    App\Shared\Application\Bus\QueryBusInterface:
        alias: App\Shared\Infrastructure\Bus\MessengerQueryBus

    App\Shared\Application\Bus\EventBusInterface:
        alias: App\Shared\Infrastructure\Bus\MessengerEventBus

    # === Bus Wiring (named Messenger buses) ===
    App\Shared\Infrastructure\Bus\MessengerCommandBus:
        arguments:
            $commandBus: '@command.bus'

    App\Shared\Infrastructure\Bus\MessengerQueryBus:
        arguments:
            $messageBus: '@query.bus'

    App\Shared\Infrastructure\Bus\MessengerEventBus:
        arguments:
            $eventBus: '@event.bus'

    # === Identity Module ===
    App\Identity\Domain\Repository\UserRepositoryInterface:
        alias: App\Identity\Infrastructure\Repository\DoctrineUserRepository

    App\Identity\Application\Port\PasswordHasherInterface:
        alias: App\Identity\Infrastructure\Hashing\SymfonyPasswordHasher

    App\Identity\Application\Port\JwtTokenManagerInterface:
        alias: App\Identity\Infrastructure\Security\LexikJwtTokenManager

    App\Identity\Application\Port\RefreshTokenManagerInterface:
        alias: App\Identity\Infrastructure\Security\RefreshTokenService

    Redis:
        class: Redis
        calls:
            - connect: ['%env(REDIS_HOST)%', '%env(int:REDIS_PORT)%']

    App\Identity\Infrastructure\Security\RefreshTokenService:
        arguments:
            $redis: '@Redis'

    App\Identity\Infrastructure\Security\SecurityUserProvider:
        arguments:
            $userRepository: '@App\Identity\Domain\Repository\UserRepositoryInterface'

    App\Identity\Infrastructure\Security\JwtCreatedListener:
        tags:
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_jwt_created, method: onJWTCreated }

    App\Identity\Application\Port\AvatarStorageInterface:
        alias: App\Identity\Infrastructure\Storage\S3AvatarStorage

    App\Identity\Infrastructure\Storage\S3AvatarStorage:
        arguments:
            $endpoint: '%env(AWS_ENDPOINT)%'
            $endpointPublic: '%env(AWS_ENDPOINT_PUBLIC)%'
            $region: '%env(AWS_REGION)%'
            $bucket: '%env(AWS_BUCKET)%'
            $accessKeyId: '%env(AWS_ACCESS_KEY_ID)%'
            $secretAccessKey: '%env(AWS_SECRET_ACCESS_KEY)%'

    # === Organization Module ===
    App\Organization\Domain\Repository\OrganizationRepositoryInterface:
        alias: App\Organization\Infrastructure\Repository\DoctrineOrganizationRepository

    App\Organization\Domain\Repository\DepartmentRepositoryInterface:
        alias: App\Organization\Infrastructure\Repository\DoctrineDepartmentRepository

    App\Organization\Domain\Repository\PositionRepositoryInterface:
        alias: App\Organization\Infrastructure\Repository\DoctrinePositionRepository

    App\Organization\Domain\Repository\EmployeeRepositoryInterface:
        alias: App\Organization\Infrastructure\Repository\DoctrineEmployeeRepository

    App\Organization\Application\Port\CurrentUserProviderInterface:
        alias: App\Organization\Infrastructure\Service\SecurityCurrentUserProvider

    App\Organization\Domain\Repository\EmployeeRoleRepositoryInterface:
        alias: App\Organization\Infrastructure\Repository\DoctrineEmployeeRoleRepository

    App\Organization\Domain\Repository\InvitationRepositoryInterface:
        alias: App\Organization\Infrastructure\Repository\DoctrineInvitationRepository

    App\Organization\Application\Port\InvitationMailerInterface:
        alias: App\Organization\Infrastructure\Service\SymfonyInvitationMailer

    App\Organization\Infrastructure\Service\SymfonyInvitationMailer:
        arguments:
            $frontendUrl: '%env(FRONTEND_URL)%'
            $fromEmail: '%env(MAILER_FROM)%'

    # === TaskManager Module ===
    App\TaskManager\Domain\Repository\TaskRepositoryInterface:
        alias: App\TaskManager\Infrastructure\Repository\DoctrineTaskRepository

    App\TaskManager\Domain\Repository\BoardRepositoryInterface:
        alias: App\TaskManager\Infrastructure\Repository\DoctrineBoardRepository

    App\TaskManager\Domain\Repository\BoardColumnRepositoryInterface:
        alias: App\TaskManager\Infrastructure\Repository\DoctrineBoardColumnRepository

    App\TaskManager\Domain\Repository\CommentRepositoryInterface:
        alias: App\TaskManager\Infrastructure\Repository\DoctrineCommentRepository

    App\TaskManager\Domain\Repository\LabelRepositoryInterface:
        alias: App\TaskManager\Infrastructure\Repository\DoctrineLabelRepository

    App\TaskManager\Domain\Repository\TaskAssignmentRepositoryInterface:
        alias: App\TaskManager\Infrastructure\Repository\DoctrineTaskAssignmentRepository

    App\TaskManager\Domain\Repository\TaskAttachmentRepositoryInterface:
        alias: App\TaskManager\Infrastructure\Repository\DoctrineTaskAttachmentRepository

    App\TaskManager\Application\Port\FileStorageInterface:
        alias: App\TaskManager\Infrastructure\Storage\S3FileStorage

    App\TaskManager\Application\Port\OrganizationQueryPort:
        alias: App\TaskManager\Infrastructure\Organization\DoctrineOrganizationQueryAdapter

    App\TaskManager\Infrastructure\Storage\S3FileStorage:
        arguments:
            $endpoint: '%env(AWS_ENDPOINT)%'
            $endpointPublic: '%env(AWS_ENDPOINT_PUBLIC)%'
            $region: '%env(AWS_REGION)%'
            $bucket: '%env(AWS_BUCKET)%'
            $accessKeyId: '%env(AWS_ACCESS_KEY_ID)%'
            $secretAccessKey: '%env(AWS_SECRET_ACCESS_KEY)%'

    # === Workflow Module ===
    App\Workflow\Domain\Repository\ProcessDefinitionRepositoryInterface:
        alias: App\Workflow\Infrastructure\Repository\DoctrineProcessDefinitionRepository

    App\Workflow\Domain\Repository\NodeRepositoryInterface:
        alias: App\Workflow\Infrastructure\Repository\DoctrineNodeRepository

    App\Workflow\Domain\Repository\TransitionRepositoryInterface:
        alias: App\Workflow\Infrastructure\Repository\DoctrineTransitionRepository

    App\Workflow\Domain\Repository\ProcessDefinitionVersionRepositoryInterface:
        alias: App\Workflow\Infrastructure\Repository\DoctrineProcessDefinitionVersionRepository

    App\Workflow\Domain\Repository\ProcessInstanceRepositoryInterface:
        alias: App\Workflow\Infrastructure\Repository\EventSourcedProcessInstanceRepository

    App\Workflow\Infrastructure\EventStore\EventStoreInterface:
        alias: App\Workflow\Infrastructure\EventStore\DoctrineEventStore

    App\Workflow\Domain\Repository\WorkflowTaskLinkRepositoryInterface:
        alias: App\Workflow\Infrastructure\Repository\DoctrineWorkflowTaskLinkRepository

    App\Workflow\Infrastructure\Timer\TimerServiceInterface:
        alias: App\Workflow\Infrastructure\Timer\RabbitMqTimerService

    App\Workflow\Infrastructure\Timer\RabbitMqTimerService:
        arguments:
            $messageBus: '@messenger.default_bus'

    # === Notification Module ===
    App\Notification\Domain\Repository\NotificationRepositoryInterface:
        alias: App\Notification\Infrastructure\Repository\DoctrineNotificationRepository

    App\TaskManager\Application\Command\TransitionTask\TransitionTaskHandler:
        arguments:
            $taskStateMachine: '@state_machine.task'

    App\TaskManager\Application\Query\ListTasks\ListTasksHandler:
        arguments:
            $taskStateMachine: '@state_machine.task'

    App\TaskManager\Application\Query\GetTask\GetTaskHandler:
        arguments:
            $taskStateMachine: '@state_machine.task'
