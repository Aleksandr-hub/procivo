nelmio_api_doc:
    documentation:
        info:
            title: 'Procivo BPM Platform API'
            description: 'REST API for Procivo — a modular BPM platform with workflow engine, task management, and organization management.'
            version: '1.0.0'
        servers:
            - url: 'http://localhost:8080'
              description: 'Local development'
        components:
            securitySchemes:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
                    description: 'JWT token obtained via /api/v1/auth/login'
        security:
            - Bearer: []
    areas:
        path_patterns:
            - '^/api(?!/doc)'
            - '^/health'
    html_config:
        assets_mode: cdn
