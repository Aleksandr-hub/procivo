framework:
    messenger:
        default_bus: command.bus

        buses:
            command.bus:
                middleware:
                    - doctrine_transaction
                    - App\Shared\Infrastructure\Bus\Middleware\DispatchDomainEventsMiddleware
            query.bus: ~
            event.bus:
                default_middleware: allow_no_handlers

        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 60000
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        routing:
            # Task events → async (RabbitMQ) for notification and audit processing
            App\TaskManager\Domain\Event\TaskCreatedEvent: async
            App\TaskManager\Domain\Event\TaskAssignedEvent: async
            App\TaskManager\Domain\Event\TaskStatusChangedEvent: async
            App\TaskManager\Domain\Event\TaskClaimedEvent: async
            App\TaskManager\Domain\Event\TaskUnclaimedEvent: async
            App\TaskManager\Domain\Event\TaskDeletedEvent: async
            App\TaskManager\Domain\Event\CommentAddedEvent: async
            # Workflow events → async (RabbitMQ) for audit processing
            # Note: ProcessCompletedEvent is intentionally NOT routed async because
            # OnSubProcessCompleted must run synchronously to continue parent process execution
            App\Workflow\Domain\Event\ProcessStartedEvent: async
            App\Workflow\Domain\Event\ProcessCancelledEvent: async
            # Workflow timer → async (RabbitMQ) with DelayStamp
            App\Workflow\Infrastructure\Timer\FireTimerMessage: async
            # Workflow webhook → async (RabbitMQ) for HTTP calls
            App\Workflow\Infrastructure\Webhook\ExecuteWebhookMessage: async
            # Workflow notification node → async (non-blocking)
            App\Workflow\Domain\Event\NotificationNodeActivatedEvent: async
            # Identity events → async (RabbitMQ) for audit processing
            App\Identity\Domain\Event\UserRegisteredEvent: async
            App\Identity\Domain\Event\PasswordChangedEvent: async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
