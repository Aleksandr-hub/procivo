framework:
    messenger:
        default_bus: command.bus

        buses:
            command.bus:
                middleware:
                    - doctrine_transaction
                    - App\Shared\Infrastructure\Bus\Middleware\DispatchDomainEventsMiddleware
            query.bus: ~
            event.bus:
                default_middleware: allow_no_handlers

        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 60000
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        routing: {}

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
