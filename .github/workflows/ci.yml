name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (PHP 8.4)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: procivo_test
          POSTGRES_USER: procivo
          POSTGRES_PASSWORD: procivo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U procivo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, intl, zip, gd, bcmath, sockets, amqp, redis, fileinfo
          coverage: none

      - name: Install dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: CS Fixer
        working-directory: backend
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: PHPStan
        working-directory: backend
        run: vendor/bin/phpstan analyse --no-progress

      - name: PHPUnit
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://procivo:procivo@localhost:5432/procivo_test?serverVersion=18&charset=utf8
        run: vendor/bin/phpunit

  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: ESLint
        working-directory: frontend
        run: npx eslint .
